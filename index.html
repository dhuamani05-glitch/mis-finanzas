<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Bóveda 💰</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --primary: #4e73df; --bg: #f8f9fc; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        /* LOGIN ADAPTABLE */
        #lock-screen { position: fixed; inset: 0; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: #2d3436; padding: 30px; border-radius: 20px; text-align: center; color: white; width: 80%; max-width: 300px; }
        
        /* --- MODO CELULAR (Por defecto) --- */
        .grid { display: flex; flex-direction: column; gap: 15px; }
        
        /* --- MODO COMPUTADORA (Pantallas grandes) --- */
        @media (min-width: 800px) {
            .grid { flex-direction: row; align-items: flex-start; }
            .main-col { flex: 2; }
            .sidebar { flex: 1; position: sticky; top: 10px; }
        }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; }
        
        /* Tabla que no se rompe en el celular */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="login-card">
        <h1>🔒</h1>
        <h3>Ingresa tu Clave</h3>
        <input type="password" id="pass-field" placeholder="Clave">
        <button onclick="acceder()">ENTRAR</button>
        <p id="error" style="color: #ff7675; display: none;">Clave incorrecta</p>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="grid">
        <div class="main-col">
            <div class="card">
                <h3>💰 Mi Presupuesto</h3>
                <input type="number" id="limite" placeholder="Límite Mensual $" onchange="update()">
                <div style="background:#eee; height:10px; border-radius:5px; margin-top:10px;">
                    <div id="barra" style="background:red; height:100%; width:0%; border-radius:5px; transition: 0.5s;"></div>
                </div>
            </div>

            <div class="card">
                <h3>📝 Registro Rápido</h3>
                <input type="text" id="desc" placeholder="¿Qué compraste?">
                <input type="number" id="monto" placeholder="Monto $">
                <select id="tipo"><option value="gasto">Gasto (-)</option><option value="ingreso">Ingreso (+)</option></select>
                <button onclick="add()">GUARDAR</button>
                
                <div class="table-container">
                    <table>
                        <thead><tr><th>Detalle</th><th>Monto</th><th></th></tr></thead>
                        <tbody id="lista"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card" style="text-align:center;">
                <h3>📊 Análisis</h3>
                <h2 id="saldo-neto">$0.00</h2>
                <canvas id="myChart"></canvas>
                <button onclick="location.reload()" style="background:#666; margin-top:20px;">Cerrar Sesión</button>
            </div>
        </div>
    </div>
</div>

<script>
    // CLAVE CONFIGURADA: 1234
    const HASH_SECRETO = "81dc9bdb52d04dc20036dbd8313ed055"; 

    function acceder() {
        const pass = document.getElementById('pass-field').value;
        if(CryptoJS.MD5(pass).toString() === HASH_SECRETO) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            update();
        } else { document.getElementById('error').style.display = 'block'; }
    }

    let items = JSON.parse(localStorage.getItem('f_v10')) || [];
    let chart;

    function add() {
        const d = document.getElementById('desc').value, m = parseFloat(document.getElementById('monto').value);
        if(!d || isNaN(m)) return;
        items.push({id: Date.now(), d, m, t: document.getElementById('tipo').value});
        update();
        document.getElementById('desc').value = ''; document.getElementById('monto').value = '';
    }

    function remove(id) {
        items = items.filter(i => i.id !== id);
        update();
    }

    function update() {
        localStorage.setItem('f_v10', JSON.stringify(items));
        const list = document.getElementById('lista');
        list.innerHTML = '';
        let inc = 0, exp = 0;

        items.slice().reverse().forEach(i => {
            if(i.t === 'ingreso') inc += i.m; else exp += i.m;
            list.innerHTML += `<tr><td>${i.d}</td><td style="color:${i.t==='ingreso'?'green':'red'}">$${i.m}</td><td><button onclick="remove(${i.id})" style="padding:5px; background:none; color:red; width:auto;">X</button></td></tr>`;
        });

        const neto = inc - exp;
        document.getElementById('saldo-neto').innerText = `$${neto.toFixed(2)}`;
        
        const lim = parseFloat(document.getElementById('limite').value) || 1;
        document.getElementById('barra').style.width = Math.min((exp/lim)*100, 100) + "%";

        renderChart(inc, exp);
    }

    function renderChart(inc, exp) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Ingresos', 'Gastos'], datasets: [{ data: [inc, exp], backgroundColor: ['#2ecc71', '#e74c3c'] }] }
        });
    }
</script>
</body>
</html>
